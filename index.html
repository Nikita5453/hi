<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поздравление с Днём Рождения</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background: linear-gradient(135deg, #ff6ec4, #7873f5);
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    h1 {
        color: white;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        margin-bottom: 30px;
    }

    button {
        padding: 20px 40px;
        font-size: 22px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        background: gold;
        color: #333;
        font-weight: bold;
        box-shadow: 0 0 20px gold;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
        box-shadow: 0 0 35px gold;
    }

    #message {
        margin-top: 30px;
        color: white;
        font-size: 28px;
        text-align: center;
        max-width: 700px;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
        padding: 0 20px;
    }

    .emoji {
        position: absolute;
        font-size: 30px;
        animation: fall linear infinite;
    }

    @keyframes fall {
        from {
            transform: translateY(-100px);
        }
        to {
            transform: translateY(110vh);
        }
    }
</style>
</head>

<body>

<h1>🎉 С Днём Рождения! 🎂</h1>

<button onclick="showGreeting()">
    🎁 Получить поздравление (5х)
</button>

<div id="message"></div>

<script>
const greetings = [
    "🎉 С днём рождения! Пусть все мечты сбываются!",
    "🎂 Желаю счастья, здоровья и удачи!",
    "🎁 Что б и дальше у тебя все было прекрасно",
    "🥳 Что б было много денег",
    "✨ И что б тебя не заменил ИИ"
];

let currentGreeting = 0;

function showGreeting() {
    document.getElementById("message").textContent =
        greetings[currentGreeting];

    currentGreeting++;

    if (currentGreeting >= greetings.length) {
        currentGreeting = 0;
    }
}


// Конфетти из эмодзи
const emojis = ["🎈", "🎉", "🎊", "🎂", "🎁"];

for (let i = 0; i < 25; i++) {
    const emoji = document.createElement("div");
    emoji.className = "emoji";
    emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];

    emoji.style.left = Math.random() * 100 + "vw";
    emoji.style.top = "-200px";
    emoji.style.animationDuration = (Math.random() * 5 + 3) + "s";
    emoji.style.animationDelay = Math.random() * 5 + "s";

    document.body.appendChild(emoji);
}
</script>

</body>
</html>
